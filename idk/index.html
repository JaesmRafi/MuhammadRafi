<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiro Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="light-mode">
    <div class="container">
        <header>
            <button id="theme-toggle">🌓</button>
            <h1 id="clock">00:00:00</h1>
            <h2 id="greeting">Loading...</h2>
            <input type="text" id="user-name" placeholder="Siapa namamu?" maxlength="15">
        </header>

        <main class="grid-layout">
            <section class="card timer">
                <h3>Focus Timer</h3>
                <div id="timer-display">25:00</div>
                <div class="controls">
                    <button id="start-btn">Start</button>
                    <button id="stop-btn">Stop</button>
                    <button id="reset-btn">Reset</button>
                </div>
            </section>

            <section class="card todo">
                <h3>To-Do List</h3>
                <form id="todo-form">
                    <input type="text" id="todo-input" placeholder="Tambah tugas baru..." required>
                    <button type="submit">Add</button>
                </form>
                <ul id="todo-list"></ul>
            </section>

            <section class="card links">
                <h3>Quick Links</h3>
                <div id="links-container"></div>
                <button id="add-link-btn">+ Add Link</button>
            </section>
        </main>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
